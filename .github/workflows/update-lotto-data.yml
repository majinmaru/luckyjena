name: Update lotto data

on:
  workflow_dispatch:
  schedule:
    - cron: '30 12 * * 6'

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build static data
        run: node scripts/build-data.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/stats.json
          git diff --cached --quiet || git commit -m "chore: update lotto data"
          git push
